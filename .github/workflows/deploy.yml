name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # If you're using a custom domain (e.g. alexundbea.com) the site should be built
        # with a root base so assets load from '/'. For project pages (username.github.io/repo)
        # you would build with --base "/<repo>/" instead. This workflow builds with '/'.
        run: |
          echo "Building with base: /"
          npm run build -- --base "/"

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact (dist)
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5.0.0
